<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรเจกต์สมัครสมาชิก</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="box" id="overlay">
        <div class="items">
            <h3 id="popup-msg"></h3>
        </div>
    </div>

    <form class="form">
        <h1>สมัครสมาชิก</h1>
        <div class="bo">
            <label>Email</label>
            <input type="email" id="Email" class="index" placeholder="ระบุอีเมลของคุณ">
            <p id="NaE"></p>

            <label>Password</label>
            <input type="password" id="psw1" class="index" placeholder="รหัสผ่าน">
            <p id="Nap1"></p>

            <label>Confirm Password</label>
            <input type="password" id="psw2" class="index" placeholder="ยืนยันรหัสผ่าน">
            <p id="Nap2"></p>

            <button id="btnY" class="index btn1" type="button">ตกลง</button>
            <button id="btnN" class="index btn2" type="button">ยกเลิก</button>
        </div>
    </form>

    <script src="app.js"></script>
</body>
</html>
